      background: #0f0f0f;
      color: #ffffff;
      display: flex;
      align-items: center;

      padding: 20px;
    }

    .seo-title {

    .box {

      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .btn:hover {

    }

    .btn:active {
